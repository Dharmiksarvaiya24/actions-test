name: pull-req trigger

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL || vars.API_URL }}
      API_KEY: ${{ secrets.API_KEY || vars.API_KEY }}

    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Create diff.toon
        run: |
          git fetch origin ${{ github.base_ref }} ${{ github.head_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} | sed 's/^/    /')

          cat > diff.toon <<'TOON'
          baseBranch: ${{ github.base_ref }}
          currentBranch: ${{ github.head_ref }}
          diff:
          $DIFF
          TOON

      - name: Run JS processor
        run: node .github/workflows/scripts/api.js


      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('api_response.txt') ? fs.readFileSync('api_response.txt', 'utf8') : '';
            const pr = context.payload && context.payload.pull_request;
            const pull_number = pr ? pr.number : context.issue.number;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              body
            });
