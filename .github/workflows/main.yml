name: pull-req trigger / pr-comment

on:
  pull_request:
    types: [opened]

jobs:
  pr-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get diff of changed files
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff origin/${{ github.base_ref }} --unified=3 > diff.txt
          echo "Diff file created."

      - name: Analyze code changes with OpenAI
        id: analyze
        env:
          OPENAI_API_KEY: ${{ secrets.API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are a code review assistant that summarizes changes in pull requests clearly and professionally.\"},
                {\"role\": \"user\", \"content\": \"Here is the diff of the pull request:\\n$(cat diff.txt | head -c 16000)\\n\\nPlease summarize the changes, mentioning what files changed and how the design, structure, or logic improved.\"}
              ],
              \"max_tokens\": 500
            }")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = JSON.parse(`${{ steps.analyze.outputs.response }}`);
            const message = response.choices?.[0]?.message?.content.";
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
