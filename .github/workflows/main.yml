name: pull-req trigger

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL || vars.API_URL }}
      API_KEY: ${{ secrets.API_KEY || vars.API_KEY }}
    steps:
    
      - name: Checkout current branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  
      
      - name: Fetch main branch
        run: |
          git fetch origin main
          
      - name: Fetch main and compute diff
        shell: bash
        run: |
          git fetch origin main --depth=1 || true
          DIFF=$(git diff --name-only origin/main HEAD || true)

          echo "DIFF<<EOF" >> $GITHUB_ENV
          printf '%s\n' "$DIFF" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send to API (URL-encoded)
        shell: bash
        run: |
          if [[ -z "${DIFF// }" ]]; then
            echo "No diff found — skipping API call."
            exit 0
          fi

          curl -X POST "$API_URL" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "diff=$DIFF"
          
      
          
           
