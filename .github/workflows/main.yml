name: pull-req trigger

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL || vars.API_URL }}
      API_KEY: ${{ secrets.API_KEY || vars.API_KEY }}
    steps:
    
      - name: Checkout current branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  
      
      - name: Fetch main branch
        run: |
          git fetch origin main
          echo "Current branch: $(git branch --show-current)"
          echo "Main branch SHA: $(git rev-parse origin/main)"
          
      - name: Compare files
        run: |
           DIFF=$(git diff --name-only origin/main HEAD)
           echo "DIFF=$DIFF" >> $GITHUB_ENV
            echo "DIFF<<EOF" >> $GITHUB_ENV
            echo "$DIFF" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV

      - name: Send diff to API
        run: |
          SAFE_DIFF="${DIFF//$'\n'/\\n}"
          curl -X POST "$API_URL" \
           -H "Authorization: Bearer $API_KEY" \
           -H "Content-Type: application/json" \
            -d "{
            \"messages\": [
              {
                \"role\": \"user\",
                \"content\": \"This data represents the main branch and the current branch—Compare it and tell what is difference in it:\\n$SAFE_DIFF\"
              }
            ]
          }"

          echo "Request completed."     
           
