name: pull-req trigger / pr-update-body

on:
  pull_request:
     types: [opened, reopened]

jobs:
  pr-update-body:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create diff file
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 || true
          git diff origin/${{ github.base_ref }} --unified=3 > diff.txt || true
          # fallback: if base_ref doesn't exist (rare), diff against HEAD~1
          if [ ! -s diff.txt ]; then
            git diff HEAD~1 --unified=3 > diff.txt || true
          fi
          head -c 16000 diff.txt > diff_short.txt
          echo "diff created (shortened to 16k)."

      - name: Call API with diff (no model specified)
        id: call_api
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # Build JSON payload safely using jq (escape content)
          payload=$(jq -nc --arg d "$(cat diff_short.txt)" '{
            messages: [
              {role: "system", content: "You are a code review assistant that summarizes changes in pull requests clearly and professionally."},
              {role: "user", content: ("Here is the diff of the pull request:\n"+$d+"\n\nPlease summarize the changes in Markdown format (## Summary, ## Files Changed, ## Improvements).")}
            ],
            max_tokens: 500
          }')

          # Call the API (no "model" field included)
          curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$payload" \
            -o response.json

          # Save a plain-text version of the assistant reply (if present)
          jq -r '.choices[0].message.content // empty' response.json > response.txt || true

          echo "API call complete. Response length: $(wc -c < response.txt || echo 0) bytes"
          ls -l response.json response.txt || true

      - name: Update PR body with API response
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # read the response (if empty, fill a fallback message)
          if [ -s response.txt ]; then
            # JSON-escape the response body for safe patching
            BODY_JSON=$(jq -Rs . response.txt)
          else
            BODY_JSON=$(jq -n '"⚠️ No response from the API. See workflow run for details."')
          fi

          OWNER_REPO="${{ github.repository }}"
          PR_NUM=${{ github.event.pull_request.number }}

          echo "Updating PR #${PR_NUM} in ${OWNER_REPO}..."

          curl -s -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER_REPO}/pulls/${PR_NUM}" \
            -d "{\"body\": ${BODY_JSON}}" \
            -o pr_update_response.json

          echo "PR update response:"
          jq -r '.message // "No message field" , .errors // empty' pr_update_response.json || true
