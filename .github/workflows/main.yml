name: pull-req trigger

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL || vars.API_URL }}
      API_KEY: ${{ secrets.API_KEY || vars.API_KEY }}
    steps:

    - name: Checkout current branch
      uses: actions/checkout@v3
      with:
          fetch-depth: 0
          
    - name: Create diff.toon file
      run: |
       git fetch origin ${{ github.base_ref }} ${{ github.head_ref }}
       DIFF=$(git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} | sed 's/^/    /')
       cat > diff.toon <<TOON
       baseBranch: ${{ github.base_ref }}
       currentBranch: ${{ github.head_ref }}
       diff:
       $DIFF
       TOON

    - name: Upload diff.toon
      uses: actions/upload-artifact@v4
      with:
          name: diff-toon
          path: diff.toon
          
    - name: Run JS processor
      run: node .github/scripts/api.js
    
    
    
