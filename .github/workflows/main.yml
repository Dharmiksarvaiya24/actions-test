name: pull-req trigger

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL || vars.API_URL }}
      API_KEY: ${{ secrets.API_KEY || vars.API_KEY }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Send API request
        id: api
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD)
          
          PAYLOAD=$(jq -n --arg diff "$DIFF" --arg pr "${{ github.event.pull_request.number }}" '{pr_number: $pr, diff: $diff}')
          
          RESPONSE=$(curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$PAYLOAD")
          
          {
            echo 'response<<EOF'
            echo "$RESPONSE"
            echo 'EOF'
          } >> $GITHUB_OUTPUT
      
      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `${{ steps.api.outputs.response }}`
            });
