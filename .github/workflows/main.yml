name: pull-req trigger

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL || vars.API_URL }}
      API_KEY: ${{ secrets.API_KEY || vars.API_KEY }}

    steps:

    - uses: actions/checkout@v4
      with:
          fetch-depth: 0
          
    - run: git fetch origin main && git fetch origin ${{ github.head_ref || github.ref_name }} && git diff origin/main..origin/${{ github.head_ref || github.ref_name }} > diff.patch

    - uses: actions/setup-node@v4
      with:
          node-version: '18'

    - run: node .github/scripts/api.js
