name: pull-req trigger
on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  pr-comment:
    runs-on: ubuntu-latest

    env:
      API_URL: ${{ secrets.API_URL || vars.API_URL }}
      API_KEY: ${{ secrets.API_KEY || vars.API_KEY }}

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: API Request
        id: send_request
        run: |
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}..HEAD)
          RESPONSE=$(curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "{\"pr_number\": \"${{ github.event.pull_request.number }}\", \"diff\": \"$DIFF\"}")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: API Response
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: `${{ steps.send_request.outputs.response }}`
            });
